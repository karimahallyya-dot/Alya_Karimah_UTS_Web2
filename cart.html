<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - Toko Mantap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-indigo-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wide">🛒 Toko<span class="text-indigo-300">Mantap</span></a>
            <div class="flex gap-3 items-center">
                <span id="userGreeting" class="text-sm font-semibold border-r border-indigo-400 pr-3"></span>
                <button id="btnLogout" onclick="logout()" class="bg-red-500 px-4 py-2 rounded-full hover:bg-red-600 transition font-semibold text-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main id="cart-page" class="container mx-auto px-4 mt-8 max-w-3xl mb-12">
        <a href="index.html" class="text-indigo-600 hover:underline font-semibold mb-4 inline-block">&larr; Lanjut Belanja</a>
        
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-indigo-700 border-b pb-4">Keranjang Belanja</h2>
            
            <div id="cart-items-detail" class="mb-6 space-y-4">
                </div>
            
            <div class="flex justify-between items-center border-t pt-6 mb-6">
                <span class="font-bold text-gray-600 text-lg">Total Pembayaran:</span>
                <span id="cart-total-detail" class="font-bold text-3xl text-amber-500">Rp 0</span>
            </div>

            <a href="checkout.html" id="btnToCheckout" class="block text-center w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg text-lg">
                Lanjut ke Pembayaran &rarr;
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
