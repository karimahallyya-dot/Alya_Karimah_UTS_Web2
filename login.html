<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toko Mantap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-indigo-50 flex items-center justify-center min-h-screen p-4">

    <div id="authSection" class="bg-white p-8 rounded-2xl shadow-2xl border border-indigo-100 w-full max-w-md">
        <a href="index.html" class="text-sm text-indigo-500 hover:text-indigo-700 font-semibold mb-6 inline-block">
            &larr; Kembali ke Toko
        </a>

        <h2 id="authTitle" class="text-3xl font-bold mb-6 text-indigo-800 text-center">Login Akun</h2>
        
        <input type="email" id="emailAuth" placeholder="Alamat Email" class="w-full mb-4 p-4 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
        <input type="password" id="passAuth" placeholder="Password (Min. 6 Karakter)" class="w-full mb-6 p-4 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition">
        
        <button onclick="prosesAuth()" id="btnSubmitAuth" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg mb-4 text-lg">
            Masuk
        </button>
        
        <p class="text-sm text-center text-gray-500 mt-4">
            Belum punya akun? 
            <span class="text-indigo-600 cursor-pointer font-bold hover:underline" onclick="switchAuthMode()">Daftar di sini</span>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
